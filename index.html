<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Николай — Ремонт бытовой техники</title>
    
    <meta property="og:title" content="Ремонт бытовой техники — Быстро и с гарантией">
    <meta property="og:description" content="Привет, соседи! Я Николай, ваш мастер по ремонту. Жмите на картинку, чтобы сохранить контакты.">
    <meta property="og:image" content="avatar.jpg"> 
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: #fff; 
            max-width: 400px; 
            margin: 20px auto; 
            padding: 30px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #ff9800; /* Оранжевая рамка в цвет каски */
            margin-bottom: 15px; 
            background-color: #eee;
        }
        h1 { font-size: 26px; margin: 10px 0; color: #222; }
        p { color: #666; margin-bottom: 25px; line-height: 1.5; font-size: 15px; }
        
        /* Стили для кнопок */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            color: #fff; 
            font-size: 16px;
            transition: transform 0.2s, opacity 0.3s; 
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.98); }
        .btn-phone { background-color: #333; }
        .btn-wa { background-color: #25D366; }
        .btn-tg { background-color: #0088cc; }
    </style>
</head>
<body>

    <div class="card">
        <img src="avatar.jpg" alt="Мастер Николай" class="avatar">
        
        <h1>Николай</h1>
        <p>Профессиональный ремонт бытовой техники.<br>Быстрый выезд, честные цены и гарантия.</p>

        <a href="tel:+79990000000" class="btn btn-phone">📞 Позвонить</a>
        <a href="https://wa.me/79990000000" class="btn btn-wa">💬 Написать в WhatsApp</a>
        <a href="https://t.me/ваш_телеграм_ник" class="btn btn-tg">✈️ Написать в Telegram</a>
    </div>

</body>
</html>
